server:
  port: 8080

# 数据库驱动选择：mysql 或 sqlite
database:
  driver: "mysql"

# MySQL 配置（driver 为 mysql 时生效）
mysql:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "your_password"
  db_name: "driver_exam"

# SQLite 配置（driver 为 sqlite 时生效）
sqlite:
  path: "data/driver_exam.db"

jisuapi:
  key: "your_jisuapi_key"

wechat:
  appid: "your_appid"
  secret: "your_secret"

# 日志配置
log:
  file: "logs/app.log"      # 日志文件路径，为空则输出到 stdout
  max_size: 100              # 单个文件最大大小（MB），超过则轮转
  max_backups: 7             # 保留的旧日志文件数
  max_age: 30                # 保留天数
  compress: true             # 是否压缩旧文件

sync:
  cron: "0 3 * * *"
  on_startup: true
  retry_interval: 30   # 重试间隔（秒）
  max_retries: 3
  min_interval_hours: 24  # 启动同步最小间隔（小时）
